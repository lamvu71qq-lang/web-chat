<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thu Nhập Ròng</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-bg: #f8f9fa;
            --blue-color: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            margin: 0;
            padding: 20px;
            color: var(--dark-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        /* Khung Đăng Nhập */
        .login-box {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: var(--dark-color);
        }

        .login-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .login-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .login-group input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--blue-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #2980b9;
        }

        .error-msg {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        /* Khung Ứng Dụng Chính (Ẩn mặc định) */
        .container {
            max-width: 800px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none;
        }

        .header-app {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .header-app h1 {
            margin: 0;
            font-size: 26px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #95a5a6;
            color: #7f8c8d;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #7f8c8d;
            color: white;
        }

        /* Thống kê tổng quan */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--light-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid #ccc;
        }

        .card.income { border-left-color: var(--primary-color); }
        .card.expense { border-left-color: var(--danger-color); }
        .card.net { border-left-color: var(--blue-color); }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            text-transform: uppercase;
            color: #7f8c8d;
        }

        .card p {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
        }

        /* Form nhập liệu */
        .form-section {
            background: var(--light-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, select, button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--blue-color);
        }

        button.btn-add {
            background-color: var(--blue-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button.btn-add:hover {
            background-color: #2980b9;
        }

        .input-hint {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            display: block;
        }

        /* Danh sách giao dịch */
        .list-section h2 {
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f1f2f6;
            color: #57606f;
        }

        .txt-income { color: var(--primary-color); font-weight: bold; }
        .txt-expense { color: var(--danger-color); font-weight: bold; }

        .btn-delete {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: var(--danger-color);
            color: white;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- KHUNG ĐĂNG NHẬP -->
<div class="login-box" id="login-box">
    <h2>🔐 Đăng Nhập</h2>
    <div class="login-group">
        <label for="username">Tài khoản</label>
        <input type="text" id="username" placeholder="Nhập tài khoản">
    </div>
    <div class="login-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu">
    </div>
    <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
    <div class="error-msg" id="error-msg">Tài khoản hoặc mật khẩu không đúng!</div>
</div>

<!-- KHUNG ỨNG DỤNG CHÍNH -->
<div class="container" id="main-app">
    <div class="header-app">
        <h1>📊 Quản Lý Thu Nhập Ròng</h1>
        <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
    </div>

    <!-- Bảng điều khiển hiển thị số liệu -->
    <div class="dashboard">
        <div class="card income">
            <h3>Tổng Thu Nhập</h3>
            <p id="total-income">0đ</p>
        </div>
        <div class="card expense">
            <h3>Tổng Chi Phí / Thuế</h3>
            <p id="total-expense">0đ</p>
        </div>
        <div class="card net">
            <h3>Thu Nhập Ròng</h3>
            <p id="net-income">0đ</p>
        </div>
    </div>

    <!-- Form Thêm Giao Dịch -->
    <div class="form-section">
        <div class="form-row">
            <input type="text" id="desc" placeholder="Tên khoản thu/chi (Ví dụ: Lương, Tiền nhà...)" required>
            <div>
                <input type="text" id="amount" placeholder="Số tiền (Ví dụ: 10k, 1.5m)" style="width: 100%; box-sizing: border-box;" required>
                <small class="input-hint">Mẹo: Gõ "k" cho nghìn, "m" cho triệu</small>
            </div>
            <select id="type">
                <option value="income">Thu Nhập</option>
                <option value="expense">Chi Phí / Thuế</option>
            </select>
            <button class="btn-add" onclick="addTransaction()">Thêm</button>
        </div>
    </div>

    <!-- Danh Sách Lịch Sử -->
    <div class="list-section">
        <h2>Lịch sử giao dịch</h2>
        <table>
            <thead>
                <tr>
                    <th>Nội dung</th>
                    <th>Loại</th>
                    <th>Số tiền</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="transaction-list"></tbody>
        </table>
    </div>
</div>

<script>
    // Kiểm tra trạng thái đăng nhập khi tải trang
    window.onload = function() {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        if (isLoggedIn === 'true') {
            showApp();
        } else {
            showLogin();
        }
    };

    // Hàm xử lý Đăng nhập
    function handleLogin() {
        const userInp = document.getElementById('username').value.trim();
        const passInp = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');

        // Tài khoản mặc định theo yêu cầu
        if (userInp === 'gbao08' && passInp === '1') {
            localStorage.setItem('isLoggedIn', 'true');
            errorMsg.style.display = 'none';
            showApp();
        } else {
            errorMsg.style.display = 'block';
        }
    }

    // Hàm xử lý Đăng xuất
    function handleLogout() {
        localStorage.removeItem('isLoggedIn');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        showLogin();
    }

    function showApp() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.body.style.alignItems = 'flex-start'; // Điều chỉnh layout cho app lớn
        updateDashboard();
    }

    function showLogin() {
        document.getElementById('login-box').style.display = 'block';
        document.getElementById('main-app').style.display = 'none';
        document.body.style.alignItems = 'center';
    }

    // --- PHẦN LOGIC QUẢN LÝ THU NHẬP RÒNG ---
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function formatCurrency(num) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(num);
    }

    function parseShortenedAmount(inputVal) {
        let cleanInput = inputVal.trim().toLowerCase();
        if (!cleanInput) return NaN;

        let multiplier = 1;
        if (cleanInput.endsWith('k')) {
            multiplier = 1000;
            cleanInput = cleanInput.slice(0, -1);
        } else if (cleanInput.endsWith('m')) {
            multiplier = 1000000;
            cleanInput = cleanInput.slice(0, -1);
        }

        cleanInput = cleanInput.replace(',', '.');
        const parsedNumber = parseFloat(cleanInput);
        if (isNaN(parsedNumber)) return NaN;

        return parsedNumber * multiplier;
    }

    function updateDashboard() {
        let totalIncome = 0;
        let totalExpense = 0;

        const listElement = document.getElementById('transaction-list');
        if(!listElement) return;
        listElement.innerHTML = '';

        transactions.forEach((t, index) => {
            if (t.type === 'income') {
                totalIncome += t.amount;
            } else {
                totalExpense += t.amount;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.desc}</td>
                <td class="${t.type === 'income' ? 'txt-income' : 'txt-expense'}">
                    ${t.type === 'income' ? 'Thu Nhập' : 'Chi Phí'}
                </td>
                <td class="${t.type === 'income' ? 'txt-income' : 'txt-expense'}">
                    ${t.type === 'income' ? '+' : '-'}${formatCurrency(t.amount)}
                </td>
                <td>
                    <button class="btn-delete" onclick="deleteTransaction(${index})">Xóa</button>
                </td>
            `;
            listElement.appendChild(row);
        });

        const netIncome = totalIncome - totalExpense;

        document.getElementById('total-income').innerText = formatCurrency(totalIncome);
        document.getElementById('total-expense').innerText = formatCurrency(totalExpense);
        
        const netElement = document.getElementById('net-income');
        netElement.innerText = formatCurrency(netIncome);
        
        if (netIncome >= 0) {
            netElement.style.color = '#2ecc71';
        } else {
            netElement.style.color = '#e74c3c';
        }

        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function addTransaction() {
        const descInput = document.getElementById('desc');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');

        const desc = descInput.value.trim();
        const amount = parseShortenedAmount(amountInput.value);
        const type = typeInput.value;

        if (!desc || isNaN(amount) || amount <= 0) {
            alert('Vui lòng nhập số tiền hợp lệ! (Ví dụ: 10k, 500k, 1.5m)');
            return;
        }

        const newTransaction = { desc, amount, type };
        transactions.push(newTransaction);
        updateDashboard();

        descInput.value = '';
        amountInput.value = '';
    }

    function deleteTransaction(index) {
        if (confirm('Bạn chắc chắn muốn xóa giao dịch này?')) {
            transactions.splice(index, 1);
            updateDashboard();
        }
    }
</script>

</body>
</html>
